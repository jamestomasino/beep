name: release-macos

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  ALIRE_VERSION: "2.1.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
            alire_asset: alr-2.1.0-bin-aarch64-macos.zip
          - runner: macos-15-intel
            arch: x86_64
            alire_asset: alr-2.1.0-bin-x86_64-macos.zip

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install Alire
        shell: bash
        run: |
          set -euo pipefail
          download_url="https://github.com/alire-project/alire/releases/download/v${ALIRE_VERSION}/${{ matrix.alire_asset }}"
          curl --fail --silent --show-error \
            --retry 5 --retry-delay 2 --retry-all-errors \
            --location "$download_url" -o alr.zip
          unzip -q alr.zip bin/alr
          mkdir -p "$HOME/.local/bin"
          install -m 0755 bin/alr "$HOME/.local/bin/alr"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Show tool versions
        shell: bash
        run: |
          set -euo pipefail
          alr --version

      - name: Build beep
        shell: bash
        run: |
          set -euo pipefail
          BEEP_OS=darwin alr -n update
          BEEP_OS=darwin alr -n build
          test -x ./obj/beep

      - name: Package release artifact
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          base="beep-${tag}-darwin-${{ matrix.arch }}"

          rm -rf package
          mkdir -p "package/${base}/bin"
          install -m 0755 ./obj/beep "package/${base}/bin/beep"
          cp README.md "package/${base}/README.md"

          tar -C package -czf "package/${base}.tar.gz" "${base}"
          shasum -a 256 "package/${base}.tar.gz" > "package/${base}.sha256"

      - name: Upload artifact bundle
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.arch }}
          path: |
            package/*.tar.gz
            package/*.sha256

  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gnat gprbuild libx11-dev libasound2-dev curl unzip

      - name: Install Alire
        shell: bash
        run: |
          set -euo pipefail
          download_url="https://github.com/alire-project/alire/releases/download/v${ALIRE_VERSION}/alr-${ALIRE_VERSION}-bin-x86_64-linux.zip"
          curl --fail --silent --show-error \
            --retry 5 --retry-delay 2 --retry-all-errors \
            --location "$download_url" -o alr.zip
          unzip -q alr.zip bin/alr
          mkdir -p "$HOME/.local/bin"
          install -m 0755 bin/alr "$HOME/.local/bin/alr"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Show tool versions
        shell: bash
        run: |
          set -euo pipefail
          alr --version
          gprbuild --version

      - name: Build beep
        shell: bash
        run: |
          set -euo pipefail
          alr -n update
          alr -n build
          test -x ./obj/beep

      - name: Package release artifact
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          base="beep-${tag}-linux-x86_64"

          rm -rf package
          mkdir -p "package/${base}/bin"
          install -m 0755 ./obj/beep "package/${base}/bin/beep"
          cp README.md "package/${base}/README.md"

          tar -C package -czf "package/${base}.tar.gz" "${base}"
          sha256sum "package/${base}.tar.gz" > "package/${base}.sha256"

      - name: Upload artifact bundle
        uses: actions/upload-artifact@v6
        with:
          name: release-linux-x86_64
          path: |
            package/*.tar.gz
            package/*.sha256

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-linux
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Combine checksums
        shell: bash
        run: |
          set -euo pipefail
          cat dist/*.sha256 > dist/SHA256SUMS

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"

          if gh release view "$tag" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "$tag" \
              dist/*.tar.gz \
              dist/*.sha256 \
              dist/SHA256SUMS \
              --clobber \
              --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "$tag" \
              dist/*.tar.gz \
              dist/*.sha256 \
              dist/SHA256SUMS \
              --generate-notes \
              --repo "${GITHUB_REPOSITORY}"
          fi
